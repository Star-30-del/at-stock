<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AT Stock — ระบบจัดการสต็อกอะไหล่</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b1120; --surface: #111827; --surface2: #1a2436;
    --border: #1e2d45; --border2: #253654; --text: #e2e8f0;
    --muted: #64748b; --blue: #3b82f6; --cyan: #06b6d4;
    --green: #10b981; --yellow: #f59e0b; --red: #ef4444;
  }
  body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  
  /* LOGIN SCREEN */
  #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .login-card { background: var(--surface); padding: 40px; border-radius: 20px; border: 1px solid var(--border); width: 360px; text-align: center; }
  
  /* APP CONTENT (Hidden initially) */
  #app-content { display: none; }

  /* UI Components */
  #header { position: sticky; top: 0; z-index: 100; background: rgba(11,17,32,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 28px; }
  .header-inner { max-width: 1440px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 62px; }
  .logo-icon { width: 38px; height: 38px; background: linear-gradient(135deg, var(--blue), var(--cyan)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 19px; }
  .main { max-width: 1440px; margin: 0 auto; padding: 24px 28px; }
  
  /* Tables & Badges */
  .table-wrap { background: var(--surface); border-radius: 14px; border: 1px solid var(--border); overflow-x: auto; margin-top: 20px; }
  table { width: 100%; border-collapse: collapse; min-width: 800px; }
  th { padding: 12px 16px; text-align: left; font-size: 11px; color: var(--muted); text-transform: uppercase; }
  td { padding: 12px 16px; font-size: 13px; border-top: 1px solid var(--border); }
  .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .badge-ok { background: #10b98114; color: #10b981; }
  .badge-low { background: #f59e0b14; color: #f59e0b; }
  .mono { font-family: 'IBM Plex Mono', monospace; }

  /* Modals */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.8); display: none; align-items: center; justify-content: center; z-index: 500; backdrop-filter: blur(4px); }
  .modal { background: var(--surface2); padding: 30px; border-radius: 18px; width: 400px; border: 1px solid var(--border2); }
  .form-input { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 10px; padding: 10px; color: #fff; margin: 8px 0 16px; outline: none; }
  .btn-submit { background: var(--blue); color: #fff; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 700; width: 100%; }
  
  /* Stats Cards */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); padding: 20px; border-radius: 14px; border: 1px solid var(--border); }
  .tab-btn { padding: 8px 16px; border: none; background: transparent; color: var(--muted); cursor: pointer; border-radius: 8px; }
  .tab-btn.active { background: var(--blue); color: #fff; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="logo-icon" style="margin: 0 auto 15px;">📦</div>
    <h2>AT Stock Login</h2><br>
    <input type="password" id="login-pass" class="form-input" placeholder="รหัสผ่าน (admin123)">
    <button class="btn-submit" onclick="checkLogin()">เข้าสู่ระบบ</button>
  </div>
</div>

<div id="app-content">
  <div id="header">
    <div class="header-inner">
      <div style="display:flex; align-items:center; gap:12px;">
        <div class="logo-icon">📦</div>
        <span style="font-weight:800;">AT Stock</span>
      </div>
      <div style="display:flex; gap:10px;">
        <button class="tab-btn active" onclick="switchTab('stock')">คลังสินค้า</button>
        <button class="tab-btn" onclick="switchTab('tx')">ประวัติ</button>
      </div>
    </div>
  </div>

  <div class="main">
    <div id="stats-grid" class="stats-grid"></div>

    <div id="tab-stock">
      <div style="display:flex; gap:10px; margin-bottom:15px;">
        <input type="text" id="search" class="form-input" style="margin:0;" placeholder="🔍 ค้นหาชื่อหรือรหัสอะไหล่..." oninput="renderAll()">
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>รหัส</th><th>ชื่ออะไหล่</th><th>คงเหลือ</th><th>จุดสั่งซื้อ</th><th>สถานะ</th><th>จัดการ</th></tr></thead>
          <tbody id="stock-body"></tbody>
        </table>
      </div>
    </div>

    <div id="tab-tx" style="display:none;">
      <div class="table-wrap">
        <table>
          <thead><tr><th>วันที่</th><th>ประเภท</th><th>รหัส</th><th>จำนวน</th><th>อ้างอิง</th></tr></thead>
          <tbody id="tx-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div id="tx-modal" class="modal-overlay">
  <div class="modal">
    <h3 id="tx-title">ทำรายการ</h3>
    <input type="hidden" id="tx-id">
    <label class="form-label">จำนวน</label>
    <input type="number" id="tx-qty" class="form-input" value="1">
    <label class="form-label">อ้างอิง/โปรเจกต์</label>
    <input type="text" id="tx-ref" class="form-input" placeholder="เช่น Union Project">
    <button class="btn-submit" onclick="submitTx()">ยืนยันรายการ</button>
    <button onclick="closeModals()" style="background:none; border:none; color:var(--muted); margin-top:10px; cursor:pointer; width:100%;">ยกเลิก</button>
  </div>
</div>

<div id="edit-modal" class="modal-overlay">
  <div class="modal">
    <h3>⚙️ แก้ไขจุดสั่งซื้อ</h3>
    <input type="hidden" id="edit-id">
    <label class="form-label">ชื่ออะไหล่</label>
    <input type="text" id="edit-desc" class="form-input">
    <label class="form-label">จุดสั่งซื้อ (Min Stock)</label>
    <input type="number" id="edit-min" class="form-input">
    <button class="btn-submit" onclick="saveEdit()">บันทึกข้อมูล</button>
    <button onclick="closeModals()" style="background:none; border:none; color:var(--muted); margin-top:10px; cursor:pointer; width:100%;">ยกเลิก</button>
  </div>
</div>

<script>
const MASTER_PASS = "admin123";
let items = JSON.parse(localStorage.getItem('at_stock_data')) || [
  {"id":"BNL6","description":"สต๊อปเปอร์เทอร์มินอล IDEC BNL6","category":"Electrical","minStock":10,"currentStock":20,"unit":"ตัว"},
  {"id":"YW1P-1UQ4G","description":"IDEC PILOTLIGHT 24VDC GREEN","category":"Electrical","minStock":10,"currentStock":5,"unit":"ตัว"},
  {"id":"QPU6","description":"ข้อต่อตรง QPU 6","category":"Pneumatic","minStock":20,"currentStock":30,"unit":"ตัว"}
];
let transactions = JSON.parse(localStorage.getItem('at_stock_tx')) || [];
let currentMode = "IN";

function checkLogin() {
  if(document.getElementById('login-pass').value === MASTER_PASS) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-content').style.display = 'block';
    renderAll();
  } else { alert("รหัสผ่านไม่ถูกต้อง!"); }
}

function renderAll() {
  const search = document.getElementById('search').value.toLowerCase();
  const body = document.getElementById('stock-body');
  body.innerHTML = items.filter(i => i.id.toLowerCase().includes(search) || i.description.toLowerCase().includes(search)).map(item => {
    const isLow = item.currentStock <= item.minStock;
    return `<tr>
      <td class="mono">${item.id}</td>
      <td>${item.description}</td>
      <td class="mono" style="font-weight:700; color:${isLow?'var(--yellow)':'inherit'}">${item.currentStock}</td>
      <td class="mono">${item.minStock}</td>
      <td><span class="badge ${isLow?'badge-low':'badge-ok'}">${isLow?'⚠️ สั่งเพิ่ม':'✅ ปกติ'}</span></td>
      <td>
        <button onclick="openTx('IN','${item.id}')" style="color:var(--green); background:none; border:none; cursor:pointer; font-weight:700;">รับ</button> | 
        <button onclick="openTx('OUT','${item.id}')" style="color:var(--red); background:none; border:none; cursor:pointer; font-weight:700;">เบิก</button> |
        <button onclick="openEdit('${item.id}')" style="color:var(--muted); background:none; border:none; cursor:pointer;">⚙️</button>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('tx-body').innerHTML = transactions.map(t => `
    <tr><td>${t.date}</td><td>${t.type==='IN'?'📥 รับ':'📤 เบิก'}</td><td>${t.id}</td><td>${t.qty}</td><td>${t.ref}</td></tr>
  `).join('');
  
  updateStats();
  localStorage.setItem('at_stock_data', JSON.stringify(items));
  localStorage.setItem('at_stock_tx', JSON.stringify(transactions));
}

function updateStats() {
  const low = items.filter(i => i.currentStock <= i.minStock).length;
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><h3>${items.length}</h3><p style="color:var(--muted); font-size:12px;">รายการทั้งหมด</p></div>
    <div class="stat-card" style="border-color:var(--red)"><h3>${low}</h3><p style="color:var(--red); font-size:12px;">ต้องสั่งเพิ่มด่วน</p></div>
  `;
}

function switchTab(t) {
  document.getElementById('tab-stock').style.display = t === 'stock' ? 'block' : 'none';
  document.getElementById('tab-tx').style.display = t === 'tx' ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(t==='stock'?'คลัง':'ประวัติ')));
}

function openTx(mode, id) {
  currentMode = mode;
  document.getElementById('tx-id').value = id;
  document.getElementById('tx-title').innerText = mode === 'IN' ? '📥 รับเข้าสต็อก' : '📤 เบิกจ่ายสต็อก';
  document.getElementById('tx-modal').style.display = 'flex';
}

function submitTx() {
  const id = document.getElementById('tx-id').value;
  const qty = parseInt(document.getElementById('tx-qty').value);
  const ref = document.getElementById('tx-ref').value || '-';
  const item = items.find(i => i.id === id);
  
  if(currentMode === 'OUT' && item.currentStock < qty) return alert("ยอดคงเหลือไม่พอ!");
  
  item.currentStock += (currentMode === 'IN' ? qty : -qty);
  transactions.unshift({ date: new Date().toLocaleDateString('th-TH'), type: currentMode, id, qty, ref });
  closeModals();
  renderAll();
}

function openEdit(id) {
  const item = items.find(i => i.id === id);
  document.getElementById('edit-id').value = id;
  document.getElementById('edit-desc').value = item.description;
  document.getElementById('edit-min').value = item.minStock;
  document.getElementById('edit-modal').style.display = 'flex';
}

function saveEdit() {
  const item = items.find(i => i.id === document.getElementById('edit-id').value);
  item.description = document.getElementById('edit-desc').value;
  item.minStock = parseInt(document.getElementById('edit-min').value);
  closeModals();
  renderAll();
}

function closeModals() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
}
</script>
</body>
</html>
