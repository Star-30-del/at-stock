<script>
// 1. นำ URL ที่ได้จากขั้นตอน "การทำให้ใช้งานได้ (Deploy)" มาวางที่นี่
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxyH0mTAPnZP9OgBx6IhRivOPi2rpfIrfcw79kvc4295xWdWObTZxPlzMUqwwWUbSN-/exec"; 

// ===== AUTH =====
const PW = '1234';
let attempts = 0;

function onPinInput(){
  const v = document.getElementById('login-input').value;
  for(let i=0;i<4;i++){ const d=document.getElementById('d'+i); if(d) d.classList.toggle('filled', i < v.length); }
  document.getElementById('login-error').textContent='';
}
function togglePw(){
  const i=document.getElementById('login-input');
  i.type=i.type==='password'?'text':'password';
}
function doLogin(){
  const v=document.getElementById('login-input').value;
  if(v===PW){
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app-screen').classList.add('show');
    loadData(); // เริ่มโหลดข้อมูลเมื่อ Login สำเร็จ
    attempts=0;
  } else {
    attempts++;
    const inp=document.getElementById('login-input');
    inp.classList.add('shake'); setTimeout(()=>inp.classList.remove('shake'),420);
    inp.value=''; for(let i=0;i<4;i++){const d=document.getElementById('d'+i);if(d)d.classList.remove('filled');}
    document.getElementById('login-error').textContent='❌ รหัสผ่านไม่ถูกต้อง';
    document.getElementById('login-attempts').textContent = attempts>1 ? `ลองผิดแล้ว ${attempts} ครั้ง` : '';
    inp.focus();
  }
}
function doLogout(){
  if(!confirm('ต้องการออกจากระบบหรือไม่?')) return;
  location.reload(); // รีโหลดหน้าเพื่อล้างข้อมูลใน Memory
}

// ===== DATA STATE =====
const CAT_TH={Electrical:'ไฟฟ้า',Pneumatic:'นิวแมติก',Mechanical:'เครื่องกล',Consumables:'วัสดุสิ้นเปลือง'};
const CAT_CLS={Electrical:'badge-cat-E',Pneumatic:'badge-cat-P',Mechanical:'badge-cat-M',Consumables:'badge-cat-C'};

let items = []; // เปลี่ยนจาก Hard-code เป็น Array ว่าง
let transactions = [];
let currentType='IN', currentTab='stock', editItemId=null;

// ===== SYNC WITH GOOGLE SHEETS =====
async function loadData() {
    showNotif('⏳ กำลังโหลดข้อมูลจาก Google Sheets...', '#3b82f6');
    try {
        const response = await fetch(SCRIPT_URL);
        if (!response.ok) throw new Error();
        items = await response.json();
        
        // อัปเดตรายการ Datalist สำหรับค้นหารหัส
        document.getElementById('item-datalist').innerHTML = items.map(i => 
            `<option value="${esc(i.id)}">${esc(i.description)}</option>`).join('');
        
        renderStats();
        renderStock();
        showNotif('✅ ข้อมูลอัปเดตแล้ว');
    } catch (e) {
        showNotif('❌ โหลดข้อมูลล้มเหลว ตรวจสอบการ Deploy หรืออินเทอร์เน็ต', '#ef4444');
    }
}

// ===== HELPERS =====
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function getItem(id){ return items.find(i=>String(i.id).toLowerCase()===String(id).toLowerCase()); }
function isLow(it){ return it.minStock>0 && it.currentStock<it.minStock; }
function pct(it){ return it.minStock===0?100:Math.min(100,Math.round(it.currentStock/it.minStock*100)); }
function barCol(it){ return it.currentStock===0?'#ef4444':isLow(it)?'#f59e0b':'#10b981'; }

// ===== RENDER =====
function renderStats(){
  if(items.length === 0) return;
  const t=items.length,l=items.filter(isLow).length,o=items.filter(i=>!isLow(i)).length,z=items.filter(i=>i.currentStock===0).length;
  document.getElementById('stats-grid').innerHTML=[
    {l:'รายการทั้งหมด',v:t,i:'📦',c:'#3b82f6'},{l:'สต็อกปกติ',v:o,i:'✅',c:'#10b981'},
    {l:'ต้องสั่งเพิ่ม',v:l,i:'⚠️',c:'#f59e0b'},{l:'หมดสต็อก',v:z,i:'🚨',c:'#ef4444'}
  ].map(d=>`<div class="stat-card" style="border-color:${d.c}22"><div class="stat-icon">${d.i}</div><div class="stat-val" style="color:${d.c}">${d.v}</div><div class="stat-label">${d.l}</div></div>`).join('');
}

function renderStock(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const cat=document.getElementById('cat-filter').value, st=document.getElementById('status-filter').value;
  const f=items.filter(it=>{
    const ms=!q||String(it.id).toLowerCase().includes(q)||String(it.description).toLowerCase().includes(q);
    return ms&&(cat==='all'||it.category===cat)&&(st==='all'||(st==='low'&&isLow(it))||(st==='ok'&&!isLow(it)));
  });
  document.getElementById('count-label').textContent=`พบ ${f.length} รายการ`;
  const body=document.getElementById('stock-body');
  if(!f.length){body.innerHTML=`<tr><td colspan="8" class="empty-row">ไม่พบรายการ</td></tr>`;return;}
  body.innerHTML=f.map(it=>{
    const low=isLow(it),empty=it.currentStock===0,p=pct(it),bc=barCol(it);
    const vc=empty?'#ef4444':low?'#f59e0b':'#10b981';
    return `<tr>
      <td><span class="mono" style="color:#93c5fd;font-size:13px">${esc(it.id)}</span></td>
      <td style="color:#e2e8f0;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(it.description)}</td>
      <td><span class="badge ${CAT_CLS[it.category]||''}">${esc(CAT_TH[it.category]||it.category)}</span></td>
      <td class="mono" style="color:#94a3b8">${it.minStock}</td>
      <td><div class="stock-cell"><span class="mono" style="color:${vc};font-weight:700;min-width:32px">${it.currentStock}</span>
        <div class="bar-wrap"><div class="bar-fill" style="width:${p}%;background:${bc}"></div></div></div></td>
      <td style="color:#64748b;font-size:12px">${esc(it.unit)}</td>
      <td><span style="font-size:12px;color:${low?'#f59e0b':'#10b981'};font-weight:600">${low?'⚠️ สั่งเพิ่ม':'✓ ปกติ'}</span></td>
      <td><div class="act-btns">
        <button class="btn-in" onclick="quickTx('${esc(it.id)}','IN')">รับเข้า</button>
        <button class="btn-out" onclick="quickTx('${esc(it.id)}','OUT')">เบิกออก</button>
      </div></td>
    </tr>`;
  }).join('');
}

// ===== SUBMIT TO GOOGLE SHEETS =====
async function submitTx(){
  const id=document.getElementById('modal-itemid').value.trim();
  const qty=parseInt(document.getElementById('modal-qty').value);
  const ref=document.getElementById('modal-ref').value.trim();
  
  if(!id || isNaN(qty) || qty <= 0) return showNotif('กรุณากรอกข้อมูลให้ครบถ้วน','#ef4444');
  
  const idx=items.findIndex(i=>String(i.id).toLowerCase()===id.toLowerCase());
  if(idx===-1) return showNotif('ไม่พบรหัสอะไหล่ในระบบ','#ef4444');
  
  const it=items[idx];
  if(currentType==='OUT'&&it.currentStock<qty) return showNotif(`สต็อกไม่เพียงพอ`,'#ef4444');

  const newStock = currentType === 'IN' ? it.currentStock + qty : it.currentStock - qty;
  
  showNotif('💾 กำลังบันทึกลง Google Sheets...', '#f59e0b');
  closeModal();

  try {
    const response = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: "updateStock",
        payload: {
          itemId: it.id,
          newStock: newStock,
          type: currentType,
          qty: qty,
          ref: ref
        }
      })
    });

    if (response.ok) {
      // อัปเดตข้อมูลในหน้าจอทันทีหลังจาก Google Sheet ตอบกลับสำเร็จ
      items[idx].currentStock = newStock;
      renderStats();
      renderStock();
      showNotif(`✅ ${currentType==='IN'?'รับเข้า':'เบิกออก'} สำเร็จ`);
    } else {
      throw new Error();
    }
  } catch (e) {
    showNotif('❌ เกิดข้อผิดพลาดในการบันทึก กรุณาลองใหม่', '#ef4444');
  }
}

// ===== UI CONTROL =====
function switchTab(n){
  currentTab=n;
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+n).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('onclick')===`switchTab('${n}')`));
  if(n==='orders') renderOrders();
}

function renderOrders(){
  const low=items.filter(isLow).sort((a,b)=>(a.currentStock/Math.max(a.minStock,1))-(b.currentStock/Math.max(b.minStock,1)));
  document.getElementById('order-header').textContent=`⚠️ รายการที่ต้องสั่งซื้อเพิ่ม (${low.length} รายการ)`;
  const body=document.getElementById('orders-body');
  if(!low.length){body.innerHTML=`<tr><td colspan="7" class="empty-row">✅ สต็อกปกติทุกรายการ</td></tr>`;return;}
  body.innerHTML=low.map(it=>{
    const n=it.minStock-it.currentStock;
    return `<tr>
      <td class="mono" style="color:#93c5fd">${esc(it.id)}</td>
      <td style="color:#e2e8f0">${esc(it.description)}</td>
      <td><span class="badge ${CAT_CLS[it.category]||''}">${esc(CAT_TH[it.category]||it.category)}</span></td>
      <td class="mono">${it.minStock}</td>
      <td class="mono" style="color:#ef4444">${it.currentStock}</td>
      <td><span style="background:#ef444422;color:#ef4444;padding:4px 14px;border-radius:20px;font-weight:800">+${n}</span></td>
      <td style="color:#64748b">${esc(it.unit)}</td>
    </tr>`;
  }).join('');
}

function openModal(id='',type='IN'){
  currentType=type;
  document.getElementById('modal-itemid').value=id;
  document.getElementById('modal-qty').value='';
  document.getElementById('modal-ref').value='';
  document.getElementById('modal-overlay').classList.add('open');
  setType(type); updateHint();
  setTimeout(()=>document.getElementById('modal-itemid').focus(),50);
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }
function quickTx(id,type){ openModal(id,type); }
function setType(type){
  currentType=type;
  document.getElementById('btn-type-in').className='type-btn'+(type==='IN'?' active-in':'');
  document.getElementById('btn-type-out').className='type-btn'+(type==='OUT'?' active-out':'');
  document.getElementById('btn-submit').textContent=type==='IN'?'ยืนยันรับเข้า':'ยืนยันเบิกออก';
  document.getElementById('btn-submit').className='btn-submit '+(type==='IN'?'in':'out');
}
function updateHint(){
  const it=getItem(document.getElementById('modal-itemid').value);
  const h=document.getElementById('item-hint');
  if(it){ h.innerHTML=`${esc(it.description)} — คงเหลือ: <b>${it.currentStock}</b> ${esc(it.unit)}`; }
  else h.innerHTML='';
}
function showNotif(msg,color='#10b981'){
  const el=document.getElementById('notif');
  el.textContent=msg; el.style.background=color; el.style.display='block';
  clearTimeout(el._t); el._t=setTimeout(()=>el.style.display='none',3000);
}

// Initial set
document.getElementById('modal-qty').addEventListener('keydown',e=>{ if(e.key==='Enter') submitTx(); });
document.getElementById('login-input').focus();
</script>
