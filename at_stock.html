<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AT Stock — ระบบจัดการสต็อก</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b1120; --surface: #111827; --surface2: #1a2436;
    --border: #1e2d45; --border2: #253654; --text: #e2e8f0;
    --muted: #64748b; --blue: #3b82f6; --cyan: #06b6d4;
    --green: #10b981; --yellow: #f59e0b; --red: #ef4444;
  }
  body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  
  /* LOGIN SCREEN */
  #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
  .login-box { background: var(--surface); padding: 40px; border-radius: 20px; border: 1px solid var(--border); width: 350px; text-align: center; }
  
  /* LAYOUT */
  #app-content { display: none; }
  #header { position: sticky; top: 0; z-index: 100; background: rgba(11,17,32,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 28px; }
  .header-inner { max-width: 1440px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 62px; }
  .tab-btn { padding: 8px 16px; border: none; background: transparent; color: var(--muted); cursor: pointer; border-radius: 8px; font-weight: 600; }
  .tab-btn.active { background: var(--blue); color: #fff; }

  /* COMPONENTS */
  .main { max-width: 1440px; margin: 0 auto; padding: 20px 28px; }
  .table-wrap { background: var(--surface); border-radius: 14px; border: 1px solid var(--border); overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 850px; }
  th { padding: 12px 16px; text-align: left; font-size: 11px; color: var(--muted); text-transform: uppercase; background: rgba(0,0,0,0.2); }
  td { padding: 12px 16px; font-size: 13px; border-top: 1px solid var(--border); }
  .mono { font-family: 'IBM Plex Mono', monospace; }
  .input-field { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 8px; padding: 10px; color: #fff; outline: none; margin-bottom: 15px; }
  
  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.8); display: none; align-items: center; justify-content: center; z-index: 500; backdrop-filter: blur(4px); }
  .modal { background: var(--surface2); padding: 25px; border-radius: 18px; width: 380px; border: 1px solid var(--border2); }
  .btn-primary { background: var(--blue); color: #fff; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 700; width: 100%; }
  .btn-edit-tool { background: none; border: 1px solid var(--border2); color: var(--muted); padding: 4px 8px; border-radius: 6px; cursor: pointer; }
  .badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
  .badge-low { background: #f59e0b15; color: var(--yellow); }
</style>
</head>
<body>

<div id="login-overlay">
  <div class="login-box">
    <div style="font-size: 40px; margin-bottom: 10px;">🛡️</div>
    <h2 style="margin-bottom: 20px;">AT Stock Login</h2>
    <input type="password" id="pass-input" class="input-field" placeholder="ใส่รหัสผ่าน...">
    <button class="btn-primary" onclick="doLogin()">เข้าสู่ระบบ</button>
    <p style="font-size: 11px; color: var(--muted); margin-top: 15px;">Default Pass: admin123</p>
  </div>
</div>

<div id="app-content">
  <div id="header">
    <div class="header-inner">
      <div style="display:flex; align-items:center; gap:10px;">
        <div style="width:35px; height:35px; background:var(--blue); border-radius:8px; display:flex; align-items:center; justify-content:center;">📦</div>
        <span style="font-weight:800;">AT STOCK</span>
      </div>
      <div class="tabs">
        <button class="tab-btn active" id="ts" onclick="switchTab('stock')">คลังอะไหล่</button>
        <button class="tab-btn" id="tt" onclick="switchTab('tx')">ประวัติรายการ</button>
      </div>
      <button onclick="location.reload()" style="background:none; border:none; color:var(--muted); cursor:pointer; font-size:12px;">ออกจากระบบ</button>
    </div>
  </div>

  <div class="main">
    <div id="tab-stock">
      <input type="text" id="search" class="input-field" placeholder="🔍 ค้นหารหัส หรือ รายการ..." oninput="render()">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>รหัสอะไหล่</th><th>ชื่อรายการ</th><th>คงเหลือ</th><th>จุดสั่งซื้อ</th><th>สถานะ</th><th>จัดการ</th></tr>
          </thead>
          <tbody id="stock-body"></tbody>
        </table>
      </div>
    </div>

    <div id="tab-tx" style="display:none;">
      <h3>🔄 ประวัติเบิก/รับ</h3><br>
      <div class="table-wrap"><table id="tx-table"><thead><tr><th>วัน/เวลา</th><th>รหัส</th><th>จำนวน</th><th>อ้างอิง</th></tr></thead><tbody id="tx-body"></tbody></table></div>
    </div>
  </div>
</div>

<div id="edit-modal" class="modal-overlay">
  <div class="modal">
    <h3 style="margin-bottom:20px;">⚙️ แก้ไขจุดสั่งซื้อ</h3>
    <input type="hidden" id="edit-id">
    <label style="font-size:12px; color:var(--muted)">ชื่อรายการ</label>
    <input type="text" id="edit-name" class="input-field">
    <label style="font-size:12px; color:var(--muted)">จุดสั่งซื้อขั้นต่ำ (Min Stock)</label>
    <input type="number" id="edit-min" class="input-field">
    <button class="btn-primary" onclick="saveEdit()">บันทึกการแก้ไข</button>
    <button onclick="closeModals()" style="background:none; border:none; color:var(--muted); width:100%; margin-top:10px; cursor:pointer;">ยกเลิก</button>
  </div>
</div>

<div id="tx-modal" class="modal-overlay">
  <div class="modal">
    <h3 id="tx-title" style="margin-bottom:20px;">บันทึกรายการ</h3>
    <input type="hidden" id="tx-target-id">
    <label style="font-size:12px; color:var(--muted)">จำนวน</label>
    <input type="number" id="tx-qty" class="input-field" value="1">
    <label style="font-size:12px; color:var(--muted)">อ้างอิง</label>
    <input type="text" id="tx-ref" class="input-field" placeholder="โปรเจกต์/ชื่อผู้เบิก">
    <button class="btn-primary" onclick="submitTx()">ยืนยัน</button>
    <button onclick="closeModals()" style="background:none; border:none; color:var(--muted); width:100%; margin-top:10px; cursor:pointer;">ยกเลิก</button>
  </div>
</div>

<script>
const ADMIN_PASS = "admin123";
let items = JSON.parse(localStorage.getItem('at_items')) || [
  {"id":"BNL6","description":"สต๊อปเปอร์เทอร์มินอล IDEC BNL6","minStock":10,"currentStock":20},
  {"id":"YW1P-1UQ4G","description":"IDEC PILOTLIGHT 24VDC GREEN","minStock":10,"currentStock":5},
  {"id":"S8FS-C05024","description":"Power Supply 24VDC 50W","minStock":2,"currentStock":1}
];
let transactions = JSON.parse(localStorage.getItem('at_tx')) || [];
let currentTxMode = 'IN';

function doLogin() {
  if(document.getElementById('pass-input').value === ADMIN_PASS) {
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('app-content').style.display = 'block';
    render();
  } else { alert("รหัสผ่านผิด!"); }
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const body = document.getElementById('stock-body');
  
  body.innerHTML = items.filter(i => i.id.toLowerCase().includes(q) || i.description.toLowerCase().includes(q)).map(i => {
    const isLow = i.currentStock <= i.minStock;
    return `<tr>
      <td class="mono"><b>${i.id}</b></td>
      <td>${i.description}</td>
      <td class="mono" style="font-weight:700; color:${isLow?'var(--yellow)':'inherit'}">${i.currentStock}</td>
      <td class="mono">${i.minStock}</td>
      <td><span class="badge ${isLow?'badge-low':''}">${isLow?'⚠️ ORDER':'✅ OK'}</span></td>
      <td>
        <button onclick="openTx('IN','${i.id}')" style="color:var(--green); background:none; border:none; cursor:pointer;">รับ</button> |
        <button onclick="openTx('OUT','${i.id}')" style="color:var(--red); background:none; border:none; cursor:pointer;">เบิก</button> |
        <button class="btn-edit-tool" onclick="openEdit('${i.id}')">⚙️</button>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('tx-body').innerHTML = transactions.map(t => `
    <tr><td>${t.time}</td><td class="mono">${t.type==='IN'?'📥':'📤'} ${t.id}</td><td class="mono">${t.qty}</td><td>${t.ref}</td></tr>
  `).join('');

  localStorage.setItem('at_items', JSON.stringify(items));
  localStorage.setItem('at_tx', JSON.stringify(transactions));
}

function openEdit(id) {
  const item = items.find(i => i.id === id);
  document.getElementById('edit-id').value = id;
  document.getElementById('edit-name').value = item.description;
  document.getElementById('edit-min').value = item.minStock;
  document.getElementById('edit-modal').style.display = 'flex';
}

function saveEdit() {
  const id = document.getElementById('edit-id').value;
  const item = items.find(i => i.id === id);
  item.description = document.getElementById('edit-name').value;
  item.minStock = parseInt(document.getElementById('edit-min').value);
  closeModals(); render();
}

function openTx(mode, id) {
  currentTxMode = mode;
  document.getElementById('tx-target-id').value = id;
  document.getElementById('tx-title').innerText = mode === 'IN' ? '📥 รับเข้าคลัง' : '📤 เบิกออก';
  document.getElementById('tx-modal').style.display = 'flex';
}

function submitTx() {
  const id = document.getElementById('tx-target-id').value;
  const qty = parseInt(document.getElementById('tx-qty').value);
  const item = items.find(i => i.id === id);
  if(currentTxMode === 'OUT' && item.currentStock < qty) return alert("สต็อกไม่พอ!");
  item.currentStock += (currentTxMode === 'IN' ? qty : -qty);
  transactions.unshift({ time: new Date().toLocaleString('th-TH'), type: currentTxMode, id, qty, ref: document.getElementById('tx-ref').value || '-' });
  closeModals(); render();
}

function switchTab(t) {
  document.getElementById('tab-stock').style.display = t === 'stock' ? 'block' : 'none';
  document.getElementById('tab-tx').style.display = t === 'tx' ? 'block' : 'none';
  document.getElementById('ts').className = `tab-btn ${t==='stock'?'active':''}`;
  document.getElementById('tt').className = `tab-btn ${t==='tx'?'active':''}`;
}

function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }
</script>
</body>
</html>
