<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AT Stock — ระบบจัดการสต็อกอะไหล่</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b1120; --surface: #111827; --surface2: #1a2436;
    --border: #1e2d45; --border2: #253654; --text: #e2e8f0; --muted: #64748b;
    --blue: #3b82f6; --cyan: #06b6d4; --green: #10b981;
    --yellow: #f59e0b; --red: #ef4444;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* IMAGE STYLES */
  .img-cell { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; background: var(--surface2); border: 1px solid var(--border); cursor: zoom-in; transition: transform 0.2s; }
  .img-cell:hover { transform: scale(1.15); }
  .img-placeholder { width: 45px; height: 45px; border-radius: 8px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--muted); border: 1px dashed var(--border2); }

  /* LOGIN */
  #login-screen { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; }
  #login-screen.hidden { display: none; }
  .login-box { background: var(--surface2); border: 1px solid var(--border2); border-radius: 24px; padding: 48px 44px; width: 380px; text-align: center; animation: slideUp .35s ease; }
  .pin-dots { display: flex; gap: 12px; justify-content: center; margin-bottom: 22px; }
  .pin-dot { width: 15px; height: 15px; border-radius: 50%; border: 2px solid var(--border2); transition: all .15s; }
  .pin-dot.filled { background: var(--blue); border-color: var(--blue); box-shadow: 0 0 10px #3b82f660; }
  .login-input { width: 100%; opacity: 0; position: absolute; pointer-events: none; }
  
  /* APP STRUCTURE */
  #app-screen { display: none; }
  #app-screen.show { display: block; }
  #header { position: sticky; top: 0; z-index: 100; background: rgba(11,17,32,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 28px; }
  .header-inner { max-width: 1440px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; gap: 16px; }
  .tab-btn { padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; background: transparent; color: var(--muted); transition: 0.2s; }
  .tab-btn.active { background: linear-gradient(135deg, var(--blue), var(--cyan)); color: #fff; }
  
  .main { max-width: 1440px; margin: 0 auto; padding: 24px 28px; }
  .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border-radius: 14px; padding: 20px; border: 1px solid var(--border); }
  .stat-val { font-size: 32px; font-weight: 800; margin-bottom: 4px; }
  
  .filters { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
  .search-box { flex: 1; background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 10px 16px; color: var(--text); outline: none; transition: 0.2s; }
  .search-box:focus { border-color: var(--blue); }
  
  .table-wrap { background: var(--surface); border-radius: 14px; border: 1px solid var(--border); overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 800px; }
  th { padding: 14px 16px; text-align: left; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  td { padding: 12px 16px; border-top: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
  
  .badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; display: inline-block; }
  .badge-cat-E { background: #3b82f615; color: #60a5fa; }
  .badge-cat-P { background: #10b98115; color: #34d399; }
  .badge-cat-M { background: #f59e0b15; color: #fbbf24; }

  .act-btns { display: flex; gap: 6px; }
  .btn-in, .btn-out, .btn-edit { padding: 6px 12px; border-radius: 8px; border: 1px solid; cursor: pointer; font-size: 12px; font-weight: 700; transition: 0.2s; background: transparent; }
  .btn-in { color: var(--green); border-color: #10b98140; }
  .btn-in:hover { background: #10b98115; }
  .btn-out { color: #f87171; border-color: #ef444440; }
  .btn-out:hover { background: #ef444415; }
  .btn-edit { color: var(--yellow); border-color: #f59e0b40; }
  .btn-edit:hover { background: #f59e0b15; }

  /* MODALS */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 500; display: none; align-items: center; justify-content: center; backdrop-filter: blur(6px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface2); padding: 32px; border-radius: 20px; width: 420px; border: 1px solid var(--border2); animation: slideUp 0.3s; }
  
  #loading-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--cyan); width: 0; transition: width .3s; z-index: 10000; }
  #notif { position: fixed; top: 24px; right: 24px; padding: 14px 24px; border-radius: 12px; color: #fff; z-index: 10001; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

  .sync-status { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
  .sync-dot.syncing { background: var(--yellow); animation: pulse 1s infinite; }

  @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2,1fr); } }
</style>
</head>
<body>

<div id="loading-bar"></div>
<div id="notif"></div>

<div id="login-screen">
  <div class="login-box">
    <div style="font-size: 50px; margin-bottom: 12px;">📦</div>
    <h2 style="margin-bottom: 8px;">AT Stock</h2>
    <p style="color: var(--muted); margin-bottom: 24px;">กรุณาใส่รหัสผ่าน 4 หลัก</p>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
    </div>
    <input type="password" id="login-input" class="login-input" maxlength="4" autofocus oninput="onPinInput()">
    <p id="login-error" style="color: var(--red); margin-top: 16px; font-size: 14px; font-weight: bold;"></p>
  </div>
</div>

<div id="app-screen">
  <div id="header">
    <div class="header-inner">
      <div style="display: flex; align-items: center; gap: 12px;">
        <span style="font-size: 24px;">📦</span>
        <span style="font-weight: 800; font-size: 18px;">AT Stock</span>
      </div>
      <div class="tabs">
        <button class="tab-btn active" id="tab-stock-btn" onclick="switchTab('stock')">คลังสินค้า</button>
        <button class="tab-btn" id="tab-orders-btn" onclick="switchTab('orders')">จุดสั่งซื้อ</button>
      </div>
      <div style="display: flex; align-items: center; gap: 12px;">
        <div class="sync-status"><div class="sync-dot" id="sync-dot"></div><span id="sync-text">เชื่อมต่อแล้ว</span></div>
        <button class="tab-btn" style="border: 1px solid var(--border2)" onclick="loadData()">🔄</button>
        <button class="tab-btn active" onclick="openModal()">+ บันทึก</button>
        <button onclick="location.reload()" style="background:none; border:none; color:var(--muted); cursor:pointer; font-size: 12px;">🔒 ออก</button>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="stats-grid" id="stats-grid"></div>

    <div class="filters">
      <input class="search-box" id="search" placeholder="🔍 ค้นหารหัส หรือ ชื่ออะไหล่..." oninput="renderStock()">
      <select class="search-box" id="cat-filter" style="flex: 0.25;" onchange="renderStock()">
        <option value="all">ทุกหมวดหมู่</option>
        <option value="Electrical">ไฟฟ้า</option>
        <option value="Pneumatic">นิวแมติก</option>
        <option value="Mechanical">เครื่องกล</option>
        <option value="Consumables">วัสดุสิ้นเปลือง</option>
      </select>
      <span id="count-label" style="color: var(--muted); font-size: 13px; font-weight: 600;"></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width: 70px;">รูป</th>
            <th style="width: 180px;">รหัสอะไหล่</th>
            <th>รายการ</th>
            <th style="width: 120px;">หมวดหมู่</th>
            <th style="width: 100px;">จุดสั่งซื้อ</th>
            <th style="width: 130px;">คงเหลือ</th>
            <th style="width: 80px;">หน่วย</th>
            <th style="width: 200px;">ดำเนินการ</th>
          </tr>
        </thead>
        <tbody id="stock-body"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 style="margin-bottom: 24px;">📝 บันทึกรายการ</h3>
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
      <button id="btn-type-in" class="tab-btn active" style="flex:1" onclick="setType('IN')">รับเข้า</button>
      <button id="btn-type-out" class="tab-btn" style="flex:1; border:1px solid var(--border2)" onclick="setType('OUT')">เบิกออก</button>
    </div>
    <div style="margin-bottom: 15px;">
      <label style="font-size: 11px; color: var(--muted); display: block; margin-bottom: 6px;">รหัสอะไหล่</label>
      <input class="search-box" style="width: 100%;" id="modal-itemid" list="item-datalist" oninput="updateHint()" placeholder="พิมพ์รหัสเพื่อค้นหา...">
    </div>
    <div id="item-hint" style="font-size: 12px; color: var(--cyan); margin-bottom: 15px; min-height: 18px; font-weight: 600;"></div>
    <div style="margin-bottom: 15px;">
      <label style="font-size: 11px; color: var(--muted); display: block; margin-bottom: 6px;">จำนวน</label>
      <input class="search-box" style="width: 100%;" id="modal-qty" type="number" placeholder="0">
    </div>
    <div style="margin-bottom: 24px;">
      <label style="font-size: 11px; color: var(--muted); display: block; margin-bottom: 6px;">อ้างอิง (ชื่อผู้เบิก/โปรเจกต์)</label>
      <input class="search-box" style="width: 100%;" id="modal-ref" placeholder="-">
    </div>
    <div style="display: flex; gap: 12px;">
      <button class="tab-btn" style="flex:1; border: 1px solid var(--border2)" onclick="closeModal()">ยกเลิก</button>
      <button id="btn-submit" class="tab-btn active" style="flex:2" onclick="submitTx()">ยืนยันบันทึก</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="edit-overlay" onclick="if(event.target===this)closeEditModal()">
  <div class="modal">
    <h3 style="margin-bottom: 20px;">✏️ แก้ไขจุดสั่งซื้อ</h3>
    <div id="edit-info" style="margin-bottom: 20px; padding: 12px; background: var(--bg); border-radius: 10px; border: 1px solid var(--border2);"></div>
    <div style="margin-bottom: 24px;">
      <label style="font-size: 11px; color: var(--muted); display: block; margin-bottom: 6px;">จุดสั่งซื้อใหม่ (Min Stock)</label>
      <input class="search-box" style="width: 100%; font-size: 18px; font-family: monospace;" id="edit-min" type="number">
    </div>
    <div style="display: flex; gap: 12px;">
      <button class="tab-btn" style="flex:1; border: 1px solid var(--border2)" onclick="closeEditModal()">ยกเลิก</button>
      <button class="tab-btn active" style="flex:2" onclick="submitEditMin()">💾 บันทึกค่าใหม่</button>
    </div>
  </div>
</div>

<datalist id="item-datalist"></datalist>

<script>
// ===== CONFIG =====
const API_URL = 'https://script.google.com/macros/s/AKfycbwT_G2qxDVr9cyYpAmby1Dkoa5yeK0XHvMb8C8piOiu2Fp1oCkrOhwn4BQtRv9QcnfvoQ/exec';
const PASSWORD = '1234';

let items = [];
let isSaving = false;
let currentType = 'IN';
let currentTab = 'stock';
let editItemId = null;

// ===== HELPERS =====
const CAT_TH = { Electrical:'ไฟฟ้า', Pneumatic:'นิวแมติก', Mechanical:'เครื่องกล', Consumables:'วัสดุสิ้นเปลือง' };
const CAT_CLS = { Electrical:'badge-cat-E', Pneumatic:'badge-cat-P', Mechanical:'badge-cat-M', Consumables:'badge-cat-M' };

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function getId(it){ return it.itemId || it.id || ''; }

// ===== API =====
async function loadData() {
  document.getElementById('loading-bar').style.width = '30%';
  setSyncStatus('syncing', 'กำลังโหลด...');
  try {
    const res = await fetch(API_URL);
    items = await res.json();
    setSyncStatus('ok', 'เชื่อมต่อแล้ว');
    updateDisplay();
    document.getElementById('loading-bar').style.width = '100%';
    setTimeout(() => document.getElementById('loading-bar').style.width = '0', 500);
  } catch(e) {
    setSyncStatus('error', 'เชื่อมต่อล้มเหลว');
    showNotif('❌ โหลดข้อมูลไม่สำเร็จ', 'var(--red)');
  }
}

async function apiPost(action, payload) {
  // ใช้ no-cors และดัก catch เพื่อจัดการ Error ที่เกิดจาก Browser บล็อก response
  try {
    await fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors',
      cache: 'no-cache',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, payload })
    });
    return true; 
  } catch(e) { return true; } // ส่งผ่าน error เพื่อให้ระบบทำงานต่อได้
}

// ===== RENDER =====
function updateDisplay() {
  renderStats();
  if(currentTab === 'stock') renderStock(); else renderOrders();
  buildDatalist();
}

function renderStock() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('cat-filter').value;
  const f = items.filter(it => {
    const id = getId(it).toLowerCase();
    const ds = (it.description || '').toLowerCase();
    return (cat === 'all' || it.category === cat) && (id.includes(q) || ds.includes(q));
  });
  renderTable(f);
}

function renderOrders() {
  const f = items.filter(it => Number(it.currentStock) < Number(it.minStock));
  renderTable(f, true);
}

function renderTable(data, isOrderPage = false) {
  const body = document.getElementById('stock-body');
  if(data.length === 0) {
    body.innerHTML = `<tr><td colspan="8" style="text-align:center; padding:60px; color:var(--muted)">${isOrderPage ? '✅ สต็อกปกติทุกรายการ' : '🔍 ไม่พบรายการที่คุณค้นหา'}</td></tr>`;
    document.getElementById('count-label').innerText = `พบ 0 รายการ`;
    return;
  }

  body.innerHTML = data.map(it => {
    const id = getId(it);
    const low = Number(it.currentStock) < Number(it.minStock);
    const p = Math.min(100, (Number(it.currentStock)/Math.max(1, Number(it.minStock)))*100);
    const color = Number(it.currentStock) <= 0 ? 'var(--red)' : low ? 'var(--yellow)' : 'var(--green)';
    
    return `
      <tr>
        <td>${it.imageUrl ? `<img src="${it.imageUrl}" class="img-cell" onclick="window.open('${it.imageUrl}')">` : `<div class="img-placeholder">🖼️</div>`}</td>
        <td style="font-family:monospace; color:var(--cyan); font-weight:600">${esc(id)}</td>
        <td title="${esc(it.description)}">${esc(it.description)}</td>
        <td><span class="badge ${CAT_CLS[it.category] || ''}">${CAT_TH[it.category] || it.category}</span></td>
        <td style="font-family:monospace">${it.minStock}</td>
        <td>
          <div style="display:flex; align-items:center; gap:8px;">
            <b style="color:${color}; font-family:monospace; font-size:15px">${it.currentStock}</b>
            <div style="flex:1; height:4px; background:var(--border2); border-radius:2px; overflow:hidden; width:40px">
              <div style="width:${p}%; background:${color}; height:100%"></div>
            </div>
          </div>
          ${isOrderPage ? `<span style="font-size:10px; color:var(--red)">ขาดอีก ${it.minStock - it.currentStock}</span>` : ''}
        </td>
        <td style="color:var(--muted)">${esc(it.unit)}</td>
        <td>
          <div class="act-btns">
            <button class="btn-in" onclick="quickTx('${esc(id)}','IN')">รับ</button>
            <button class="btn-out" onclick="quickTx('${esc(id)}','OUT')">เบิก</button>
            <button class="btn-edit" onclick="openEditModal('${esc(id)}')">✏️</button>
          </div>
        </td>
      </tr>
    `;
  }).join('');
  document.getElementById('count-label').innerText = `พบ ${data.length} รายการ`;
}

function renderStats() {
  const total = items.length;
  const low = items.filter(it => Number(it.currentStock) < Number(it.minStock)).length;
  const out = items.filter(it => Number(it.currentStock) <= 0).length;
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-val" style="color:var(--blue)">${total}</div><div style="color:var(--muted); font-size:12px">รายการทั้งหมด</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--green)">${total - low}</div><div style="color:var(--muted); font-size:12px">สต็อกปกติ</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--yellow)">${low}</div><div style="color:var(--muted); font-size:12px">ต้องสั่งเพิ่ม</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--red)">${out}</div><div style="color:var(--muted); font-size:12px">หมดสต็อก</div></div>
  `;
}

// ===== ACTIONS =====
async function submitTx() {
  if(isSaving) return;
  const itemId = document.getElementById('modal-itemid').value.trim();
  const qty = parseInt(document.getElementById('modal-qty').value);
  const ref = document.getElementById('modal-ref').value.trim() || '-';
  const idx = items.findIndex(i => getId(i).toLowerCase() === itemId.toLowerCase());

  if(!itemId || isNaN(qty) || qty <= 0 || idx === -1) { showNotif('⚠️ ข้อมูลไม่ถูกต้อง', 'var(--yellow)'); return; }

  const it = items[idx];
  const oldStock = Number(it.currentStock);
  const newStock = currentType === 'IN' ? oldStock + qty : oldStock - qty;
  if(newStock < 0) { showNotif('❌ สต็อกไม่พอเบิก', 'var(--red)'); return; }

  // UI UPDATE
  items[idx].currentStock = newStock;
  updateDisplay();
  closeModal();
  isSaving = true;
  setSyncStatus('syncing', 'กำลังบันทึก...');

  try {
    await apiPost('updateStock', { itemId: getId(it), newStock, type: currentType, qty, ref });
    setSyncStatus('ok', 'เชื่อมต่อแล้ว');
    showNotif('✅ บันทึกสำเร็จ');
  } catch(e) {
    items[idx].currentStock = oldStock; // Rollback
    updateDisplay();
    setSyncStatus('error', 'บันทึกล้มเหลว');
    showNotif('❌ บันทึกล้มเหลว', 'var(--red)');
  } finally { isSaving = false; }
}

async function submitEditMin() {
  if(isSaving) return;
  const v = parseInt(document.getElementById('edit-min').value);
  const idx = items.findIndex(i => getId(i) === editItemId);
  if(idx === -1 || isNaN(v) || v < 0) return;

  const oldMin = items[idx].minStock;
  items[idx].minStock = v;
  updateDisplay();
  closeEditModal();
  isSaving = true;
  setSyncStatus('syncing', 'กำลังอัปเดต...');

  try {
    await apiPost('updateMinStock', { itemId: editItemId, minStock: v });
    setSyncStatus('ok', 'เชื่อมต่อแล้ว');
    showNotif('✅ อัปเดตจุดสั่งซื้อสำเร็จ');
  } catch(e) {
    items[idx].minStock = oldMin;
    updateDisplay();
    showNotif('❌ อัปเดตล้มเหลว', 'var(--red)');
  } finally { isSaving = false; }
}

// ===== UI LOGIC =====
function onPinInput() {
  const v = document.getElementById('login-input').value;
  for(let i=0; i<4; i++) document.getElementById('d'+i).className = 'pin-dot' + (i < v.length ? ' filled' : '');
  if(v.length === 4) {
    if(v === PASSWORD) {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('app-screen').classList.add('show');
      loadData();
    } else {
      document.getElementById('login-error').innerText = 'รหัสผ่านไม่ถูกต้อง!';
      document.getElementById('login-input').value = '';
      setTimeout(() => { document.getElementById('login-error').innerText = ''; onPinInput(); }, 1500);
    }
  }
}

function switchTab(t) {
  currentTab = t;
  document.getElementById('tab-stock-btn').className = t === 'stock' ? 'tab-btn active' : 'tab-btn';
  document.getElementById('tab-orders-btn').className = t === 'orders' ? 'tab-btn active' : 'tab-btn';
  updateDisplay();
}

function openModal(id = '', type = 'IN') {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-itemid').value = id;
  document.getElementById('modal-qty').value = '';
  setType(type); updateHint();
}
function closeModal() { if(!isSaving) document.getElementById('modal-overlay').classList.remove('open'); }

function openEditModal(id) {
  const it = items.find(i => getId(i) === id);
  if(!it) return;
  editItemId = id;
  document.getElementById('edit-info').innerHTML = `<div style="color:var(--cyan); font-weight:800">${id}</div><div style="font-size:13px">${it.description}</div>`;
  document.getElementById('edit-min').value = it.minStock;
  document.getElementById('edit-overlay').classList.add('open');
}
function closeEditModal() { if(!isSaving) document.getElementById('edit-overlay').classList.remove('open'); }

function setType(t) {
  currentType = t;
  document.getElementById('btn-type-in').className = t === 'IN' ? 'tab-btn active' : 'tab-btn';
  document.getElementById('btn-type-out').className = t === 'OUT' ? 'tab-btn active' : 'tab-btn';
  document.getElementById('btn-submit').textContent = t === 'IN' ? 'ยืนยันรับเข้า' : 'ยืนยันเบิกออก';
}

function updateHint() {
  const id = document.getElementById('modal-itemid').value;
  const it = items.find(i => getId(i).toLowerCase() === id.toLowerCase());
  document.getElementById('item-hint').innerText = it ? `${it.description} (คลัง: ${it.currentStock} ${it.unit})` : '';
}

function buildDatalist() {
  document.getElementById('item-datalist').innerHTML = items.map(i => `<option value="${esc(getId(i))}">${esc(i.description)}</option>`).join('');
}

function setSyncStatus(state, text) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot ' + (state === 'syncing' ? 'syncing' : state === 'error' ? 'error' : '');
  document.getElementById('sync-text').innerText = text;
}

function showNotif(m, c = 'var(--green)') {
  const n = document.getElementById('notif');
  n.innerText = m; n.style.background = c; n.style.display = 'block';
  setTimeout(() => n.style.display = 'none', 3000);
}

function quickTx(id, type) { openModal(id, type); }

// Login Focus Fix
document.addEventListener('click', () => { if(!document.getElementById('login-screen').classList.contains('hidden')) document.getElementById('login-input').focus(); });
</script>
</body>
</html>
