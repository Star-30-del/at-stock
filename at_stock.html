<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AT Stock — ระบบจัดการสต็อกอะไหล่</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b1120; --surface: #111827; --surface2: #1a2436;
    --border: #1e2d45; --border2: #253654; --text: #e2e8f0; --muted: #64748b;
    --blue: #3b82f6; --cyan: #06b6d4; --green: #10b981;
    --yellow: #f59e0b; --red: #ef4444;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  
  /* IMAGE STYLES */
  .img-cell { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; background: var(--surface2); border: 1px solid var(--border); cursor: zoom-in; transition: transform 0.2s; }
  .img-cell:hover { transform: scale(1.1); }
  .img-placeholder { width: 45px; height: 45px; border-radius: 8px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--muted); border: 1px dashed var(--border2); }

  /* LOGIN SCREENS & APP STYLES (Keep existing) */
  #login-screen { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; }
  #login-screen.hidden { display: none; }
  .login-box { background: var(--surface2); border: 1px solid var(--border2); border-radius: 24px; padding: 48px 44px; width: 380px; max-width: 92vw; box-shadow: 0 32px 80px rgba(0,0,0,.65); text-align: center; animation: slideUp .35s ease; }
  .pin-dots { display: flex; gap: 12px; justify-content: center; margin-bottom: 22px; }
  .pin-dot { width: 15px; height: 15px; border-radius: 50%; border: 2px solid var(--border2); background: transparent; transition: all .15s; }
  .pin-dot.filled { background: var(--blue); border-color: var(--blue); box-shadow: 0 0 10px #3b82f660; }
  .login-input { width: 100%; background: var(--bg); border: 1.5px solid var(--border2); border-radius: 12px; padding: 13px; color: var(--text); font-size: 22px; text-align: center; outline: none; }
  
  #app-screen { display: none; }
  #app-screen.show { display: block; }
  #header { position: sticky; top: 0; z-index: 100; background: rgba(11,17,32,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 28px; }
  .header-inner { max-width: 1440px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 62px; gap: 16px; }
  .tab-btn { padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; background: transparent; color: var(--muted); }
  .tab-btn.active { background: linear-gradient(135deg, var(--blue), var(--cyan)); color: #fff; }
  
  .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border-radius: 14px; padding: 20px; border: 1px solid var(--border); position: relative; }
  .stat-val { font-size: 32px; font-weight: 800; }
  
  .filters { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; }
  .search-box { flex: 1; background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 10px 16px; color: var(--text); outline: none; }
  
  .table-wrap { background: var(--surface); border-radius: 14px; border: 1px solid var(--border); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 12px 16px; text-align: left; font-size: 11px; color: var(--muted); text-transform: uppercase; }
  td { padding: 10px 16px; border-top: 1px solid var(--border); font-size: 13px; }
  
  .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .badge-cat-E { background: #3b82f615; color: #60a5fa; }
  .stock-cell { display: flex; align-items: center; gap: 10px; }
  .bar-wrap { width: 50px; height: 5px; background: var(--border2); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; }

  .act-btns { display: flex; gap: 5px; }
  .btn-in, .btn-out, .btn-edit-min { padding: 5px 10px; border-radius: 6px; border: 1px solid; cursor: pointer; font-size: 12px; font-weight: 700; background: transparent; }
  .btn-in { color: var(--green); border-color: #10b98144; }
  .btn-out { color: #f87171; border-color: #ef444444; }
  .btn-edit-min { color: var(--yellow); border-color: #f59e0b44; }

  /* MODALS */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 500; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface2); padding: 30px; border-radius: 18px; width: 400px; border: 1px solid var(--border2); }
  
  #loading-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--cyan); width: 0; transition: width .3s; z-index: 9999; }
  #notif { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 10px; color: #fff; z-index: 10000; display: none; animation: fadeIn 0.3s; }

  @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2,1fr); } }
</style>
</head>
<body>

<div id="loading-bar"></div>
<div id="notif"></div>

<div id="login-screen">
  <div class="login-box">
    <div style="font-size: 50px; margin-bottom: 10px;">📦</div>
    <h2>AT Stock</h2>
    <p style="color: var(--muted); margin-bottom: 20px;">กรุณาใส่รหัสผ่าน</p>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
    </div>
    <input type="password" id="login-input" class="login-input" maxlength="4" oninput="onPinInput()" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="tab-btn active" style="width: 100%; margin-top: 20px; padding: 12px;" onclick="doLogin()">เข้าสู่ระบบ</button>
    <p id="login-error" style="color: var(--red); margin-top: 10px;"></p>
  </div>
</div>

<div id="app-screen">
  <div id="header">
    <div class="header-inner">
      <div style="display: flex; align-items: center; gap: 10px;">
        <span style="font-size: 24px;">📦</span>
        <span style="font-weight: 800;">AT Stock</span>
      </div>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('stock')">คลังสินค้า</button>
        <button class="tab-btn" onclick="switchTab('orders')">จุดสั่งซื้อ</button>
      </div>
      <div style="display: flex; align-items: center; gap: 10px;">
        <button class="tab-btn" style="border: 1px solid var(--border2)" onclick="loadData()">🔄 รีเฟรช</button>
        <button class="tab-btn active" onclick="openModal()">+ บันทึก</button>
        <button onclick="location.reload()" style="background:none; border:none; color:var(--muted); cursor:pointer;">🔒 ออก</button>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="stats-grid" id="stats-grid"></div>

    <div id="tab-stock" class="tab-content">
      <div class="filters">
        <input class="search-box" id="search" placeholder="🔍 ค้นหารหัส หรือ ชื่ออะไหล่..." oninput="renderStock()">
        <select class="search-box" id="cat-filter" style="flex: 0.3;" onchange="renderStock()">
          <option value="all">ทุกหมวดหมู่</option>
          <option value="Electrical">ไฟฟ้า</option>
          <option value="Pneumatic">นิวแมติก</option>
          <option value="Mechanical">เครื่องกล</option>
          <option value="Consumables">วัสดุสิ้นเปลือง</option>
        </select>
        <span id="count-label" style="color: var(--muted); font-size: 13px;"></span>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>รูป</th>
              <th>รหัสอะไหล่</th>
              <th>รายการ</th>
              <th>หมวดหมู่</th>
              <th>จุดสั่งซื้อ</th>
              <th>คงเหลือ</th>
              <th>หน่วย</th>
              <th>ดำเนินการ</th>
            </tr>
          </thead>
          <tbody id="stock-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title" style="margin-bottom: 20px;">📝 บันทึกรายการ</h3>
    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
      <button id="btn-type-in" class="tab-btn active" style="flex:1" onclick="setType('IN')">รับเข้า</button>
      <button id="btn-type-out" class="tab-btn" style="flex:1; border:1px solid var(--border2)" onclick="setType('OUT')">เบิกออก</button>
    </div>
    <input class="search-box" style="width: 100%; margin-bottom: 10px;" id="modal-itemid" placeholder="รหัสอะไหล่" list="item-datalist" oninput="updateHint()">
    <datalist id="item-datalist"></datalist>
    <div id="item-hint" style="font-size: 12px; color: var(--muted); margin-bottom: 15px; min-height: 18px;"></div>
    <input class="search-box" style="width: 100%; margin-bottom: 15px;" id="modal-qty" type="number" placeholder="จำนวน">
    <input class="search-box" style="width: 100%; margin-bottom: 20px;" id="modal-ref" placeholder="อ้างอิง/ชื่อผู้เบิก">
    <div style="display: flex; gap: 10px;">
      <button class="tab-btn" style="flex:1; border: 1px solid var(--border2)" onclick="closeModal()">ยกเลิก</button>
      <button id="btn-submit" class="tab-btn active" style="flex:2" onclick="submitTx()">ยืนยัน</button>
    </div>
  </div>
</div>

<script>
// ===== CONFIG =====
const API_URL = 'https://script.google.com/macros/s/AKfycbwT_G2qxDVr9cyYpAmby1Dkoa5yeK0XHvMb8C8piOiu2Fp1oCkrOhwn4BQtRv9QcnfvoQ/exec';
const PASSWORD = '1234';

let items = [];
let isSaving = false;
let currentType = 'IN';

// ===== HELPERS =====
const CAT_TH = { Electrical:'ไฟฟ้า', Pneumatic:'นิวแมติก', Mechanical:'เครื่องกล', Consumables:'วัสดุสิ้นเปลือง' };
const CAT_CLS = { Electrical:'badge-cat-E', Pneumatic:'badge-cat-P', Mechanical:'badge-cat-M', Consumables:'badge-cat-C' };

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function getId(it){ return it.itemId || it.id || ''; }

// ===== API =====
async function loadData() {
  document.getElementById('loading-bar').style.width = '50%';
  try {
    const res = await fetch(API_URL);
    items = await res.json();
    renderStats();
    renderStock();
    buildDatalist();
    document.getElementById('loading-bar').style.width = '100%';
    setTimeout(() => document.getElementById('loading-bar').style.width = '0', 500);
  } catch(e) {
    showNotif('❌ โหลดข้อมูลไม่สำเร็จ', '#ef4444');
  }
}

async function apiPost(action, payload) {
  return fetch(API_URL, {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify({ action, payload })
  });
}

// ===== RENDER =====
function renderStock() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('cat-filter').value;
  const f = items.filter(it => {
    const id = getId(it).toLowerCase();
    const ds = (it.description || '').toLowerCase();
    return (cat === 'all' || it.category === cat) && (id.includes(q) || ds.includes(q));
  });

  const body = document.getElementById('stock-body');
  body.innerHTML = f.map(it => {
    const id = getId(it);
    const low = Number(it.currentStock) < Number(it.minStock);
    const imgUrl = it.imageUrl; // ตรวจสอบว่ามีคอลัมน์ imageUrl ใน Sheet
    
    return `
      <tr>
        <td>
          ${imgUrl ? `<img src="${imgUrl}" class="img-cell" onclick="window.open('${imgUrl}')">` : `<div class="img-placeholder">🖼️</div>`}
        </td>
        <td style="font-family:monospace; color:var(--cyan)">${esc(id)}</td>
        <td>${esc(it.description)}</td>
        <td><span class="badge ${CAT_CLS[it.category] || ''}">${CAT_TH[it.category] || it.category}</span></td>
        <td style="color:var(--muted)">${it.minStock}</td>
        <td>
          <div class="stock-cell">
            <b style="color:${low ? 'var(--yellow)' : 'var(--green)'}">${it.currentStock}</b>
            <div class="bar-wrap">
              <div class="bar-fill" style="width:${Math.min(100, (it.currentStock/it.minStock)*100)}%; background:${low ? 'var(--yellow)' : 'var(--green)'}"></div>
            </div>
          </div>
        </td>
        <td style="color:var(--muted)">${esc(it.unit)}</td>
        <td>
          <div class="act-btns">
            <button class="btn-in" onclick="quickTx('${esc(id)}','IN')">รับ</button>
            <button class="btn-out" onclick="quickTx('${esc(id)}','OUT')">เบิก</button>
          </div>
        </td>
      </tr>
    `;
  }).join('');
  document.getElementById('count-label').innerText = `พบ ${f.length} รายการ`;
}

function renderStats() {
  const total = items.length;
  const low = items.filter(it => Number(it.currentStock) < Number(it.minStock)).length;
  const out = items.filter(it => Number(it.currentStock) <= 0).length;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-val" style="color:var(--blue)">${total}</div><div style="color:var(--muted)">รายการทั้งหมด</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--green)">${total - low}</div><div style="color:var(--muted)">สต็อกปกติ</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--yellow)">${low}</div><div style="color:var(--muted)">ต้องสั่งเพิ่ม</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--red)">${out}</div><div style="color:var(--muted)">หมดสต็อก</div></div>
  `;
}

// ===== ACTIONS =====
async function submitTx() {
  if(isSaving) return;
  const itemId = document.getElementById('modal-itemid').value.trim();
  const qty = parseInt(document.getElementById('modal-qty').value);
  const ref = document.getElementById('modal-ref').value.trim();
  const idx = items.findIndex(i => getId(i).toLowerCase() === itemId.toLowerCase());

  if(!itemId || isNaN(qty) || qty <= 0 || idx === -1) {
    showNotif('⚠️ ข้อมูลไม่ถูกต้อง', 'var(--yellow)');
    return;
  }

  const it = items[idx];
  const oldStock = Number(it.currentStock);
  const newStock = currentType === 'IN' ? oldStock + qty : oldStock - qty;

  if(newStock < 0) { showNotif('❌ สต็อกไม่พอ', 'var(--red)'); return; }

  // Optimistic UI
  items[idx].currentStock = newStock;
  renderStock(); renderStats();
  closeModal();
  isSaving = true;

  try {
    await apiPost('updateStock', { itemId: getId(it), newStock, type: currentType, qty, ref });
    showNotif('✅ บันทึกสำเร็จ');
  } catch(e) {
    items[idx].currentStock = oldStock; // Rollback
    renderStock(); renderStats();
    showNotif('❌ บันทึกล้มเหลว', 'var(--red)');
  } finally { isSaving = false; }
}

// ===== UI LOGIC =====
function onPinInput() {
  const v = document.getElementById('login-input').value;
  for(let i=0; i<4; i++) document.getElementById('d'+i).className = 'pin-dot' + (i < v.length ? ' filled' : '');
  if(v.length === 4) doLogin();
}

function doLogin() {
  if(document.getElementById('login-input').value === PASSWORD) {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app-screen').classList.add('show');
    loadData();
  } else {
    document.getElementById('login-error').innerText = 'รหัสผ่านผิด!';
    document.getElementById('login-input').value = '';
    onPinInput();
  }
}

function openModal(id = '', type = 'IN') {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-itemid').value = id;
  setType(type);
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function setType(t) {
  currentType = t;
  document.getElementById('btn-type-in').className = t === 'IN' ? 'tab-btn active' : 'tab-btn';
  document.getElementById('btn-type-out').className = t === 'OUT' ? 'tab-btn active' : 'tab-btn';
}

function showNotif(m, c = 'var(--green)') {
  const n = document.getElementById('notif');
  n.innerText = m; n.style.background = c; n.style.display = 'block';
  setTimeout(() => n.style.display = 'none', 3000);
}

function buildDatalist() {
  document.getElementById('item-datalist').innerHTML = items.map(i => `<option value="${esc(getId(i))}">${esc(i.description)}</option>`).join('');
}

function quickTx(id, type) { openModal(id, type); }

function updateHint() {
  const id = document.getElementById('modal-itemid').value;
  const it = items.find(i => getId(i).toLowerCase() === id.toLowerCase());
  document.getElementById('item-hint').innerText = it ? `${it.description} (ในคลัง: ${it.currentStock})` : '';
}

function switchTab(t) {
  // Simple tab logic for demo
  if(t === 'orders') {
    document.getElementById('search').value = '';
    document.getElementById('cat-filter').value = 'all';
    // กรองเฉพาะของที่ต้องสั่งเพิ่ม
    const f = items.filter(it => Number(it.currentStock) < Number(it.minStock));
    // render logic (simplified for this example)
    showNotif('แสดงรายการที่ต้องสั่งซื้อ');
  } else {
    renderStock();
  }
}

document.getElementById('login-input').focus();

</script>
</body>
</html>
