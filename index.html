<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Water Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      color: white;
    }

    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .level {
      font-size: 60px;
      font-weight: bold;
    }

    .status {
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>

<body id="body">
<div class="container">
  <div class="level" id="level">Loading...</div>
  <div class="status" id="time">--</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // 🔧 ใส่ของคุณตรงนี้
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    databaseURL: "YOUR_DATABASE_URL"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const levelText = document.getElementById("level");
  const timeText = document.getElementById("time");
  const body = document.getElementById("body");

  function getColor(level) {
    if (level === "HIGH") return "red";
    if (level === "MEDIUM") return "orange";
    if (level === "LOW") return "blue";
    return "gray";
  }

  const levelRef = ref(db, "water/level");

  onValue(levelRef, (snapshot) => {
    const level = snapshot.val();

    console.log("DATA:", level);

    if (level) {
      levelText.innerText = level;
      body.style.backgroundColor = getColor(level);
      timeText.innerText = "Last update: " + new Date().toLocaleString();
    } else {
      levelText.innerText = "No Data";
    }
  });
</script>

</body>
</html>
